services:
  engine:
    build: .
    env_file: .env
    environment:
      - DB_PATH=/data/autogolpe.db
      - NODE_OPTIONS=--max-old-space-size=256
    volumes:
      - ./data:/data
    restart: unless-stopped

  feed:
    build: .
    command: ["node", "packages/feed/dist/index.js"]
    environment:
      - FEED_PORT=3006
      - FEED_HOSTNAME=malone.taildf301e.ts.net:4443
    ports:
      - "3006:3006"
    restart: unless-stopped
